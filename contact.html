<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Custom Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header & Navigation -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Custom<span>Store</span></a>
                <ul class="nav-links">
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="products.html">Sản phẩm</a></li>
                    <li><a href="news.html">Tin tức</a></li>
                    <li><a href="about.html">Về chúng tôi</a></li>
                    <li><a href="contact.html" class="active">Liên hệ</a></li>
                    <li><a href="cart.html">Giỏ hàng <span id="cart-count">0</span></a></li>
                </ul>
                <div class="nav-actions" id="nav-actions">
                    <!-- Nội dung sẽ được thêm bằng JavaScript -->
                </div>
            </nav>
        </div>
    </header>

    <section class="contact-section">
        <div class="container">
            <h1 class="page-title">Liên hệ</h1>
            <div class="contact-card">
                <div class="contact-card-header">
                    <div class="contact-card-icon"><i class="fas fa-store"></i></div>
                    <div class="contact-card-title">
                        <h2>Custom Store</h2>
                        <p>Thông tin liên hệ cửa hàng</p>
                    </div>
                </div>
                <div class="contact-card-body">
                    <div class="contact-row">
                        <div class="contact-label"><i class="fas fa-map-marker-alt"></i> Địa chỉ</div>
                        <div class="contact-value" id="contact-page-address">--</div>
                    </div>
                    <div class="contact-row">
                        <div class="contact-label"><i class="fas fa-phone-alt"></i> Số điện thoại</div>
                        <div class="contact-value" id="contact-page-phone">--</div>
                    </div>
                    <div class="contact-row">
                        <div class="contact-label"><i class="fas fa-envelope"></i> Email</div>
                        <div class="contact-value" id="contact-page-email">--</div>
                    </div>
                    <div class="contact-social">
                        <a id="contact-page-facebook" href="#" target="_blank" rel="noopener" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                        <a id="contact-page-instagram" href="#" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                        <a id="contact-page-twitter" href="#" target="_blank" rel="noopener" aria-label="X (Twitter)"><i class="fab fa-twitter"></i></a>
                        <a id="contact-page-youtube" href="#" target="_blank" rel="noopener" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>
                <div class="contact-actions">
                    <a href="index.html" class="btn-secondary"><i class="fas fa-home"></i> Về Trang Chủ</a>
                    <a href="products.html" class="btn-primary"><i class="fas fa-shopping-bag"></i> Xem sản phẩm</a>
                </div>
            </div>
        </div>
    </section>

    <footer></footer>

    <script src="js/user.js"></script>
    <script src="js/item.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
